<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY OTT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="logo">MY OTT</h1>

<!-- SHOWS -->
<div id="shows" class="section">
    <h2>Popular</h2>
    <div class="slider">
        <div class="poster" onclick="showSection('seasons')">
            <img src="invincible.jpg" alt="">
            <span>Invincible</span>
        </div>
    </div>
</div>

<!-- SEASONS -->
<div id="seasons" class="section hidden">
    <button class="back" onclick="showSection('shows')">⬅ Back</button>
    <h2>Seasons</h2>
    <div class="slider">
        <div class="poster" onclick="showSection('season1')">
            <img src="season1.jpg" alt="">
            <span>Season 1</span>
        </div>
    </div>
</div>

<!-- SEASON 1 -->
<div id="season1" class="section hidden">
    <button class="back" onclick="showSection('seasons')">⬅ Back</button>
    <h2>Season 1</h2>

    <!-- VIDEO PLAYER -->
    <div id="player" class="video-container hidden">
        <iframe id="videoFrame" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- EPISODES -->
    <div class="slider">
        <div class="episode" onclick="playVideo('id1mdHJvqC8')">Episode 1</div>
        <div class="episode" onclick="playVideo('ynKh_AUYF9U')">Episode 2</div>
        <div class="episode" onclick="playVideo('-za29-REDWQ')">Episode 3</div>
        <div class="episode" onclick="playVideo('-5PP-zjUKqw')">Episode 4</div>
        <div class="episode" onclick="playVideo('mC-0RKiMu-o')">Episode 5</div>
        <div class="episode" onclick="playVideo('s7DTOwdJGiA')">Episode 6</div>
        <div class="episode" onclick="playVideo('JBNcZUk6XAw')">Episode 7</div>
        <div class="episode" onclick="playVideo('JxIn385kdSo')">Episode 8</div>
    </div>
</div>

<script>
function showSection(id){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
}

function playVideo(id){
    const player = document.getElementById("player");
    const frame = document.getElementById("videoFrame");
    frame.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
    player.classList.remove("hidden");
}
</script>

</body>
</html>
