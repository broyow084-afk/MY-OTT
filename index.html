<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY OTT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">MY OTT</div>
</header>

<section class="section">
    <h2>Popular</h2>

    <div class="poster-wrapper">
        <div class="poster-card" onclick="openPlayer()">
            <img src="demon.jpg" alt="Poster">
            <div class="overlay">
                <div class="play-icon">▶</div>
            </div>
        </div>
        <div class="poster-name">Demon Slayer: Kimetsu No Yaiba The Movie: Infinity Castle
2025 ‧ Action/Animation ‧ 2h 35m</div>
    </div>
</section>

<!-- PLAYER MODAL -->
<div class="player" id="player">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <div class="video-container">
        <iframe 
            id="videoFrame"
            allow="autoplay"
            allowfullscreen>
        </iframe>
    </div>
</div>

<script>
function openPlayer(){
    document.getElementById("player").classList.add("active");
    document.getElementById("videoFrame").src =
    "https://drive.google.com/file/d/1ZvndJXqF9DQ2Uj_gILbXz6sFQQE1E3sW/preview";
}

function closePlayer(){
    document.getElementById("videoFrame").src="";
    document.getElementById("player").classList.remove("active");
}
</script>

</body>
</html>
