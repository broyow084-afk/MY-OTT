<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY OTT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="logo">MY OTT</h1>

<!-- SHOWS -->
<div id="shows" class="section">
    <h2>Popular</h2>
    <div class="slider">
        <div class="poster" onclick="showSection('seasons')">
            <img src="invincible.jpg">
            <span>Invincible</span>
        </div>
    </div>
</div>

<!-- SEASONS -->
<div id="seasons" class="section hidden">
    <button class="back" onclick="showSection('shows')">⬅ Back</button>
    <h2>Seasons</h2>
    <div class="slider">
        <div class="poster" onclick="showSection('season1')">
            <img src="season1.jpg">
            <span>Season 1</span>
        </div>
        <div class="poster" onclick="showSection('season2')">
            <img src="season2.jpg">
            <span>Season 2</span>
        </div>
    </div>
</div>

<!-- VIDEO PLAYER -->
<div id="playerSection" class="section hidden">
    <button class="back" onclick="closePlayer()">⬅ Back</button>
    <div class="video-container">
        <iframe id="videoFrame" allowfullscreen></iframe>
    </div>
</div>

<!-- SEASON 1 -->
<div id="season1" class="section hidden">
    <button class="back" onclick="showSection('seasons')">⬅ Back</button>
    <h2>Season 1</h2>
    <div class="slider">
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1hH7gaZYN0tenvIyneHELOxfK2jPFl41c/preview')">E01</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1nI0oYqQdqRo1HR-wZ4_opHGZgsweJGVr/preview')">E02</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1xpeewO8mEtehnPLHmarFnpYx6D0-XkHD/preview')">E03</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1_FhBXqTAm6X_jAXM1WM0eCJ6CjLxSztb/preview')">E04</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1pjPI7Id5Yv0dIsG-dAwClO1fHUU2r17o/preview')">E05</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1fNBfj6yK0Fpwat3FACfS-o9AK6QFItu9/preview')">E06</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1mxun6EEKtAwuR5rZBGv8HSAS3z5eVjfv/preview')">E07</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1mRjYqO9pTkFC478FjvZygis7xrjJ1orF/preview')">E08</div>
    </div>
</div>

<!-- SEASON 2 -->
<div id="season2" class="section hidden">
    <button class="back" onclick="showSection('seasons')">⬅ Back</button>
    <h2>Season 2</h2>
    <div class="slider">
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/107Y7daV6E_mGZHO3inN6OTxEQrq14oEx/preview')">E01</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/13kiYhxmXNZz1I6RnZUW5C-xHftvk4MIX/preview')">E02</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/152JJVxCZxjNUwyjAmmNUU_O6ARuNK-i8/preview')">E03</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/18tqk_so6AopLsBI9jWUDs9HjAbc_k2Ah/preview')">E04</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1pOsF-dvLagGIjRaKNMnh3g-Mei3XY9f0/preview')">E05</div>
        <div class="episode" onclick="playVideo('https://drive.google.com/file/d/1E-pDsbpHgxgTKK6wo9j0ne1-QElXWHu9/preview')">E06</div>
    </div>
</div>

<script>
function showSection(id){
    document.querySelectorAll(".section")
    .forEach(s => s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function playVideo(url){
    document.querySelectorAll(".section")
    .forEach(s => s.classList.add("hidden"));
    document.getElementById("playerSection").classList.remove("hidden");
    document.getElementById("videoFrame").src = url;
}

function closePlayer(){
    document.getElementById("videoFrame").src = "";
    showSection('seasons');
}
</script>

</body>
</html>
